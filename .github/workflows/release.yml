name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release artifacts
        run: scripts/create-release-artifacts.sh "${GITHUB_REF_NAME#v}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "Mac Bastion ${GITHUB_REF_NAME#v}" \
              --notes-file "docs/releases/${GITHUB_REF_NAME#v}.md"
            gh release upload "$GITHUB_REF_NAME" \
              dist/MacBastionMenu-${GITHUB_REF_NAME#v}-macos-arm64.zip \
              dist/mbastion-${GITHUB_REF_NAME#v}-macos-arm64.tar.gz \
              dist/SHA256SUMS.txt \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/MacBastionMenu-${GITHUB_REF_NAME#v}-macos-arm64.zip \
              dist/mbastion-${GITHUB_REF_NAME#v}-macos-arm64.tar.gz \
              dist/SHA256SUMS.txt \
              --title "Mac Bastion ${GITHUB_REF_NAME#v}" \
              --notes-file "docs/releases/${GITHUB_REF_NAME#v}.md"
          fi
